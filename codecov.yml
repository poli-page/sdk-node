coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "tests/**"
  - "demo/**"
  - "docs/**"
  - "scripts/**"
