name: Release

# Tag-triggered release. Push a tag `vX.Y.Z` to run checks, then (after manual
# approval on the `npm-publish` environment) publish to npm via OIDC Trusted
# Publishing with Sigstore provenance, and create the GitHub Release.
#
# Flow:
#   1. Bump version in package.json + move CHANGELOG [Unreleased] -> [X.Y.Z]; push to main.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#   3. `verify` runs all checks on the tagged commit.
#   4. `publish` waits for a required reviewer (you) to approve, then publishes.
#
# Auth: npm Trusted Publisher must be configured for THIS repo + workflow file
# (release.yml) + environment (npm-publish). No NPM_TOKEN secret is used.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Derive version from tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> version $VERSION"

      - name: Guard A — tag matches package.json
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PKG_VERSION" != "${{ steps.ver.outputs.version }}" ]]; then
            echo "::error::package.json ($PKG_VERSION) does not match tag (${{ steps.ver.outputs.version }})"
            echo "Refusing: bump package.json to ${{ steps.ver.outputs.version }} (or retag) before releasing." >&2
            exit 1
          fi
          echo "package.json matches tag ($PKG_VERSION) — OK."

      - name: Guard B — version not already on npm
        env:
          NPM_CONFIG_MIN_RELEASE_AGE: 0
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          if npm view "@poli-page/sdk@$V" version >/dev/null 2>&1; then
            echo "::error::@poli-page/sdk@$V already exists on npm"
            echo "Refusing: that version is already published." >&2
            exit 1
          fi
          echo "@poli-page/sdk@$V is not yet published — OK."

      - name: Install dependencies
        run: npm ci

      - name: Apply patches (patch-package)
        # .npmrc sets ignore-scripts=true, which also skips our postinstall.
        # Run patch-package explicitly so the @arethetypeswrong/core patch lands.
        run: npx patch-package

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Type tests
        run: npm run test:types

      - name: Build
        run: npm run build

      - name: Validate published types & manifest (attw + publint)
        run: npm run lint:pack

      - name: Pack and show contents
        run: |
          set -euo pipefail
          TARBALL="$(npm pack | tail -n 1)"
          echo "Tarball: $TARBALL ($(du -h "$TARBALL" | cut -f1))"
          tar -tzf "$TARBALL"

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # OIDC for npm provenance + Trusted Publishing
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (OIDC Trusted Publishing needs >= 11.5)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Apply patches (patch-package)
        run: npx patch-package

      - name: Build
        run: npm run build

      - name: Compute dist-tag
        id: disttag
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          if [[ "$V" == *-* ]]; then TAG=next; else TAG=latest; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Publishing $V to dist-tag $TAG"

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance --tag "${{ steps.disttag.outputs.tag }}"

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          V="${{ steps.disttag.outputs.version }}"
          # Print lines between "## [V]" and the next "## [" heading.
          awk -v ver="$V" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [[ ! -s RELEASE_NOTES.md ]]; then
            echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi
          echo "----- notes -----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${{ steps.disttag.outputs.version }}"
          PRERELEASE=""
          if [[ "${{ steps.disttag.outputs.tag }}" == "next" ]]; then PRERELEASE="--prerelease"; fi
          gh release create "v$V" \
            --title "v$V" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE
