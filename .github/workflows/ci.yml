name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Allow codecov-action's tokenless (OIDC) upload on public repo.
  id-token: write

defaults:
  run:
    # bash is available on Windows runners via Git Bash; this keeps every
    # step (including the install-smoke heredocs) portable across OSes.
    shell: bash

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [20, 22, 24]
        include:
          # Windows verification on the current LTS. Catches path/EOL/shell
          # surprises without paying for a full OS × Node matrix.
          - os: windows-latest
            node-version: 22
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply patches (patch-package)
        # .npmrc sets ignore-scripts=true to block dep install scripts, which
        # also skips our own postinstall. Run patch-package explicitly so the
        # @arethetypeswrong/core multi-chunk-gunzip patch lands before attw.
        run: npx patch-package

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Type tests
        run: npm run test:types

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          # OIDC auth — no CODECOV_TOKEN secret needed; requires id-token: write
          # (set at the workflow level) and the repo to be enrolled at codecov.io.
          use_oidc: true
          fail_ci_if_error: false

      - name: Build
        run: npm run build

      - name: Validate published types & manifest (attw + publint)
        run: npm run lint:pack

      - name: Bundle-size budget (size-limit)
        run: npm run size

      - name: Verify registry signatures of installed packages
        # .npmrc's min-release-age=3 (a supply-chain guard for installs) makes
        # npm 11.6+'s audit-signatures fail with ETARGET when any installed
        # package was published in the last 3 days. Disable it just here —
        # audit signatures only queries registry metadata, no install happens.
        env:
          NPM_CONFIG_MIN_RELEASE_AGE: 0
        run: npm audit signatures

      - name: Install smoke (ESM + CJS from packed tarball)
        run: |
          set -euo pipefail
          TARBALL="$(npm pack | tail -n 1)"
          ABS_TARBALL="$PWD/$TARBALL"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null
          npm install "$ABS_TARBALL" >/dev/null
          cat > smoke.mjs <<'EOF'
          import { PoliPage } from '@poli-page/sdk';
          if (typeof PoliPage !== 'function') {
            console.error('ESM smoke FAILED: typeof PoliPage =', typeof PoliPage);
            process.exit(1);
          }
          console.log('ESM smoke OK: typeof PoliPage =', typeof PoliPage);
          EOF
          cat > smoke.cjs <<'EOF'
          const { PoliPage } = require('@poli-page/sdk');
          if (typeof PoliPage !== 'function') {
            console.error('CJS smoke FAILED: typeof PoliPage =', typeof PoliPage);
            process.exit(1);
          }
          console.log('CJS smoke OK: typeof PoliPage =', typeof PoliPage);
          EOF
          node smoke.mjs
          node smoke.cjs
