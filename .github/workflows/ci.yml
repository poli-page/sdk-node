name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack smoke test
        run: |
          pnpm pack
          tar -tf poli-page-sdk-*.tgz | grep -E "package/dist/index\.(js|cjs|d\.ts)$" || (echo "Missing dist files in pack" && exit 1)
          tar -tf poli-page-sdk-*.tgz | grep -E "package/(README\.md|LICENSE|package\.json)$" || (echo "Missing top-level files in pack" && exit 1)
