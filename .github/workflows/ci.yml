name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Type tests
        run: pnpm test:types

      - name: Build
        run: pnpm build

      - name: Validate published types & manifest (attw + publint)
        run: pnpm lint:pack

      - name: Bundle-size budget (size-limit)
        run: pnpm size

      - name: Install smoke (ESM + CJS from packed tarball)
        run: |
          set -euo pipefail
          TARBALL="$(pnpm pack | tail -n 1)"
          ABS_TARBALL="$PWD/$TARBALL"
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null
          npm install "$ABS_TARBALL" >/dev/null
          cat > smoke.mjs <<'EOF'
          import { PoliPage } from '@poli-page/sdk';
          if (typeof PoliPage !== 'function') {
            console.error('ESM smoke FAILED: typeof PoliPage =', typeof PoliPage);
            process.exit(1);
          }
          console.log('ESM smoke OK: typeof PoliPage =', typeof PoliPage);
          EOF
          cat > smoke.cjs <<'EOF'
          const { PoliPage } = require('@poli-page/sdk');
          if (typeof PoliPage !== 'function') {
            console.error('CJS smoke FAILED: typeof PoliPage =', typeof PoliPage);
            process.exit(1);
          }
          console.log('CJS smoke OK: typeof PoliPage =', typeof PoliPage);
          EOF
          node smoke.mjs
          node smoke.cjs
