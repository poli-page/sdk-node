lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      '@poli-page/sdk':
        specifier: file:../..
        version: file:../..

packages:

  '@poli-page/sdk@file:../..':
    resolution: {directory: ../.., type: directory}
    engines: {node: '>=20.18.0'}

snapshots:

  '@poli-page/sdk@file:../..': {}
